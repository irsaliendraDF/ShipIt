<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Tap-A-Gram — tap candies, build a love note in bricks" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="tg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="tg-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#tg-bg)"/>

  <!-- dark stage panel -->
  <rect x="80" y="60" width="640" height="330" rx="14" fill="url(#tg-panel)" stroke="#1a1a1a" stroke-width="3"/>

  <!-- timer pill, top center of stage -->
  <g transform="translate(400 90)">
    <rect x="-50" y="-14" width="100" height="28" rx="14" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="700" fill="#1a1a1a" letter-spacing="2">00:42</text>
  </g>

  <!-- score, top right -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="2" text-anchor="end">
    <text x="690" y="100" fill-opacity="0.7">SCORE</text>
    <text x="690" y="118" font-size="18" font-weight="700">128</text>
  </g>

  <!-- brick mosaic forming a pixel HEART on the left of the stage -->
  <g shape-rendering="crispEdges">
    <!-- heart pattern in chunky bricks; each brick is 20x16 -->
    <!-- row 1 -->
    <rect x="180" y="170" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="200" y="170" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="240" y="170" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="260" y="170" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <!-- row 2 -->
    <rect x="160" y="186" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="180" y="186" width="20" height="16" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="200" y="186" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="220" y="186" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="240" y="186" width="20" height="16" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="260" y="186" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="280" y="186" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <!-- row 3 -->
    <rect x="160" y="202" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="180" y="202" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="200" y="202" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="220" y="202" width="20" height="16" fill="#fde9c8" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="240" y="202" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="260" y="202" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="280" y="202" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <!-- row 4 -->
    <rect x="180" y="218" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="200" y="218" width="20" height="16" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="220" y="218" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="240" y="218" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="260" y="218" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <!-- row 5 -->
    <rect x="200" y="234" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="220" y="234" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="240" y="234" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
    <!-- row 6 -->
    <rect x="220" y="250" width="20" height="16" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <!-- floating candies that fall from above to tap -->
  <g shape-rendering="crispEdges">
    <!-- good candy 1 (bubblegum) -->
    <g transform="translate(420 130)">
      <circle r="14" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="700" fill="#1a1a1a">+1</text>
    </g>
    <!-- bonus candy (orange star-like) -->
    <g transform="translate(490 175)">
      <polygon points="0,-16 4,-5 16,-5 6,3 10,15 0,7 -10,15 -6,3 -16,-5 -4,-5" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="700" fill="#1a1a1a">x2</text>
    </g>
    <!-- good candy 2 (purple) -->
    <g transform="translate(560 145)">
      <circle r="14" fill="#8b5cf6" stroke="#1a1a1a" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="700" fill="#fde9c8">+1</text>
    </g>
    <!-- bad gray candy (avoid) -->
    <g transform="translate(620 220)" opacity="0.85">
      <circle r="12" fill="#9c9c9c" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="-7" y1="-7" x2="7" y2="7" stroke="#1a1a1a" stroke-width="2"/>
      <line x1="-7" y1="7" x2="7" y2="-7" stroke="#1a1a1a" stroke-width="2"/>
    </g>
    <!-- good candy 3 -->
    <g transform="translate(480 290)">
      <circle r="13" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="2"/>
    </g>
    <!-- good candy 4 -->
    <g transform="translate(580 320)">
      <circle r="13" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="2"/>
    </g>
  </g>

  <!-- tap effects: rings emanating from a touch point -->
  <g transform="translate(420 130)" fill="none" stroke="#fde9c8" stroke-width="2">
    <circle r="22" opacity="0.65"/>
    <circle r="32" opacity="0.35"/>
  </g>

  <!-- love-note caption at the bottom of the stage -->
  <g>
    <rect x="160" y="320" width="480" height="44" rx="6" fill="#fde9c8" stroke="#1a1a1a" stroke-width="2"/>
    <g font-family="Fraunces, Georgia, serif" font-style="italic">
      <text x="180" y="343" font-size="16" fill="#1a1a1a">to:</text>
      <text x="206" y="343" font-size="16" font-weight="700" fill="#ff7a3d">you,</text>
    </g>
    <g font-family="ui-monospace, Menlo, monospace">
      <text x="180" y="358" font-size="9" fill="#1a1a1a" fill-opacity="0.6" letter-spacing="2">FROM A TAP-A-GRAM SENDER · TONE: SWEET</text>
    </g>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1a1a1a" letter-spacing="2">
    <text x="32" y="42" font-weight="700">// TAP-A-GRAM</text>
    <text x="32" y="62" font-size="11" fill-opacity="0.65">60s love notes</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">
    <text x="768" y="42" font-weight="700">[ TAP TO BUILD ]</text>
    <text x="768" y="62" fill-opacity="0.65">share via url</text>
  </g>

  <rect x="80" y="402" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="3" text-anchor="middle">
    <text x="400" y="422" font-weight="700">TAP CANDIES. BUILD A NOTE IN BRICKS. SHARE THE LINK.</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
