<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Aura Tap thumbnail">
  <defs>
    <radialGradient id="at-bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#1c1726"/>
      <stop offset="60%" stop-color="#15101e"/>
      <stop offset="100%" stop-color="#08060e"/>
    </radialGradient>
    <radialGradient id="at-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffe1" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#ff8a3d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="at-note" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00ffe1"/>
      <stop offset="100%" stop-color="#00ffe1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="at-note-warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="at-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="at-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#at-bg)"/>
  <rect width="800" height="450" fill="url(#at-grid)"/>

  <!-- Aura halo around figure -->
  <ellipse cx="400" cy="240" rx="240" ry="200" fill="url(#at-aura)" filter="url(#at-blur)"/>

  <!-- Two beat tracks (left + right hand lanes) -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="2 8">
    <line x1="240" y1="60" x2="240" y2="400"/>
    <line x1="560" y1="60" x2="560" y2="400"/>
  </g>

  <!-- Notes streaming in (rhythm dots) -->
  <g>
    <!-- left lane teal notes -->
    <circle cx="240" cy="100" r="14" fill="url(#at-note)"/>
    <circle cx="240" cy="100" r="5" fill="#ffffff"/>
    <circle cx="240" cy="170" r="11" fill="url(#at-note)" opacity="0.85"/>
    <circle cx="240" cy="170" r="3" fill="#ffffff"/>
    <circle cx="240" cy="240" r="9" fill="url(#at-note)" opacity="0.6"/>
    <!-- right lane warm notes -->
    <circle cx="560" cy="120" r="14" fill="url(#at-note-warm)"/>
    <circle cx="560" cy="120" r="5" fill="#ffffff"/>
    <circle cx="560" cy="200" r="11" fill="url(#at-note-warm)" opacity="0.85"/>
    <circle cx="560" cy="200" r="3" fill="#ffffff"/>
    <circle cx="560" cy="280" r="9" fill="url(#at-note-warm)" opacity="0.6"/>
  </g>

  <!-- Hit zones (the bottom rings where you tap) -->
  <g fill="none" stroke-width="2">
    <circle cx="240" cy="370" r="28" stroke="#00ffe1" stroke-opacity="0.7"/>
    <circle cx="240" cy="370" r="34" stroke="#00ffe1" stroke-opacity="0.25"/>
    <circle cx="560" cy="370" r="28" stroke="#ff8a3d" stroke-opacity="0.75"/>
    <circle cx="560" cy="370" r="34" stroke="#ff8a3d" stroke-opacity="0.25"/>
  </g>

  <!-- Hand silhouettes hovering over hit zones -->
  <g fill="#00ffe1" fill-opacity="0.22" stroke="#00ffe1" stroke-width="1.2" stroke-opacity="0.85">
    <!-- Left hand: simple palm with 5 finger dots -->
    <ellipse cx="240" cy="370" rx="18" ry="22"/>
    <circle cx="222" cy="354" r="3"/>
    <circle cx="232" cy="346" r="3"/>
    <circle cx="244" cy="344" r="3"/>
    <circle cx="254" cy="350" r="3"/>
    <circle cx="259" cy="362" r="3"/>
  </g>
  <g fill="#ff8a3d" fill-opacity="0.22" stroke="#ff8a3d" stroke-width="1.2" stroke-opacity="0.85">
    <ellipse cx="560" cy="370" rx="18" ry="22"/>
    <circle cx="542" cy="354" r="3"/>
    <circle cx="552" cy="346" r="3"/>
    <circle cx="564" cy="344" r="3"/>
    <circle cx="574" cy="350" r="3"/>
    <circle cx="579" cy="362" r="3"/>
  </g>

  <!-- "AURA" callout in center -->
  <g font-family="ui-monospace, Menlo, monospace" text-anchor="middle">
    <text x="400" y="220" font-size="56" font-weight="700" fill="#ffffff" letter-spacing="8" opacity="0.9">AURA</text>
    <text x="400" y="252" font-size="14" font-weight="700" fill="#ff8a3d" letter-spacing="6">▲ TAP ▲</text>
    <text x="400" y="280" font-size="10" fill="#00ffe1" letter-spacing="4" opacity="0.75">MOTHER IS MOTHERING</text>
  </g>

  <!-- Combo / score readout -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" letter-spacing="2" fill-opacity="0.85">
    <text x="400" y="60" text-anchor="middle" fill="#ff8a3d">COMBO ×128</text>
  </g>

  <!-- HUD labels -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ff8a3d" fill-opacity="0.85" letter-spacing="2">
    <text x="32" y="40">// AURA_TAP</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ffffff" fill-opacity="0.45" letter-spacing="2.5">
    <text x="32" y="60">RHYTHM.HANDS</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#00ffe1" fill-opacity="0.75" letter-spacing="2" text-anchor="end">
    <text x="768" y="40">[ MEDIAPIPE ]</text>
    <text x="768" y="60" fill="#ff8a3d" fill-opacity="0.75">PERFECT</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#ff8a3d" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
