<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Aura Tap — hand-tracked rhythm game">
  <defs>
    <linearGradient id="at-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="at-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a1f3d"/>
    </linearGradient>
    <radialGradient id="at-aura" cx="50%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#ff6fb5" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ff6fb5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#at-bg)"/>

  <!-- dark stage panel -->
  <rect x="80" y="60" width="640" height="330" rx="14" fill="url(#at-panel)" stroke="#1a1a1a" stroke-width="3"/>
  <ellipse cx="400" cy="370" rx="280" ry="120" fill="url(#at-aura)"/>

  <!-- 3 lanes -->
  <g stroke="#fde9c8" stroke-opacity="0.15" stroke-width="1">
    <line x1="230" y1="80" x2="230" y2="290"/>
    <line x1="290" y1="80" x2="290" y2="290"/>
    <line x1="400" y1="80" x2="400" y2="290"/>
    <line x1="460" y1="80" x2="460" y2="290"/>
    <line x1="570" y1="80" x2="570" y2="290"/>
    <line x1="630" y1="80" x2="630" y2="290"/>
  </g>

  <!-- falling rhythm notes with strong outlines -->
  <g stroke="#1a1a1a" stroke-width="2">
    <rect x="230" y="100" width="60" height="26" rx="4" fill="#ff6fb5"/>
    <rect x="230" y="160" width="60" height="26" rx="4" fill="#ff6fb5" opacity="0.7"/>
    <rect x="230" y="220" width="60" height="26" rx="4" fill="#ff6fb5" opacity="0.45"/>
    <rect x="400" y="120" width="60" height="26" rx="4" fill="#ff7a3d"/>
    <rect x="400" y="200" width="60" height="26" rx="4" fill="#ff7a3d" opacity="0.65"/>
    <rect x="570" y="100" width="60" height="26" rx="4" fill="#8b5cf6"/>
    <rect x="570" y="170" width="60" height="26" rx="4" fill="#8b5cf6" opacity="0.7"/>
    <rect x="570" y="240" width="60" height="26" rx="4" fill="#8b5cf6" opacity="0.4"/>
  </g>

  <!-- hit line -->
  <line x1="100" y1="305" x2="700" y2="305" stroke="#fde9c8" stroke-width="2" stroke-dasharray="6 6" opacity="0.6"/>

  <!-- hit burst rings -->
  <g transform="translate(260 305)">
    <circle r="20" fill="none" stroke="#fde9c8" stroke-width="3"/>
    <circle r="32" fill="none" stroke="#ff6fb5" stroke-width="2" opacity="0.7"/>
    <circle r="46" fill="none" stroke="#ff7a3d" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- hand silhouette in cream against dark panel -->
  <g transform="translate(400 360)">
    <path d="M -55 30 Q -60 -50, -25 -65 L -22 -25 L -10 -78 L 5 -78 L 8 -25 L 22 -85 L 38 -82 L 35 -25 L 50 -68 L 62 -60 L 50 10 Q 45 50, 0 55 Q -42 55, -55 30 Z"
            fill="#fde9c8" stroke="#1a1a1a" stroke-width="2"/>
    <g fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1.2">
      <circle cx="-45" cy="20" r="3.5"/>
      <circle cx="-25" cy="-30" r="3.5"/>
      <circle cx="-15" cy="-58" r="3.5"/>
      <circle cx="-2" cy="-65" r="3.5"/>
      <circle cx="15" cy="-68" r="3.5"/>
      <circle cx="32" cy="-65" r="3.5"/>
      <circle cx="45" cy="-50" r="3.5"/>
      <circle cx="50" cy="-10" r="3.5"/>
      <circle cx="40" cy="35" r="3.5"/>
      <circle cx="0" cy="40" r="3.5"/>
    </g>
    <g stroke="#ff6fb5" stroke-width="2" fill="none">
      <line x1="-45" y1="20" x2="-25" y2="-30"/>
      <line x1="-25" y1="-30" x2="-15" y2="-58"/>
      <line x1="-25" y1="-30" x2="-2" y2="-65"/>
      <line x1="-25" y1="-30" x2="15" y2="-68"/>
      <line x1="-25" y1="-30" x2="32" y2="-65"/>
      <line x1="0" y1="40" x2="-45" y2="20"/>
      <line x1="0" y1="40" x2="40" y2="35"/>
      <line x1="40" y1="35" x2="50" y2="-10"/>
      <line x1="50" y1="-10" x2="45" y2="-50"/>
      <line x1="45" y1="-50" x2="32" y2="-65"/>
    </g>
  </g>

  <!-- equalizer bars in cream -->
  <g fill="#fde9c8">
    <rect x="98" y="180" width="6" height="80"/>
    <rect x="110" y="150" width="6" height="110"/>
    <rect x="122" y="200" width="6" height="60"/>
    <rect x="134" y="120" width="6" height="140"/>
    <rect x="146" y="180" width="6" height="80"/>
  </g>
  <g fill="#ff7a3d">
    <rect x="652" y="140" width="6" height="120"/>
    <rect x="664" y="180" width="6" height="80"/>
    <rect x="676" y="120" width="6" height="140"/>
    <rect x="688" y="200" width="6" height="60"/>
    <rect x="700" y="160" width="6" height="100"/>
  </g>

  <!-- HUD labels in jet -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1a1a1a" letter-spacing="2">
    <text x="32" y="42" font-weight="700">// AURA TAP</text>
    <text x="32" y="62" font-size="11" fill-opacity="0.65">rhythm.hand</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">
    <text x="768" y="42" font-weight="700">[ HAND.TRACK ]</text>
    <text x="768" y="62" fill-opacity="0.65">combo x12</text>
  </g>

  <rect x="80" y="402" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="3" text-anchor="middle">
    <text x="400" y="422" font-weight="700">TAP NOTES WITH YOUR HANDS. CATCH THE BEAT.</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
