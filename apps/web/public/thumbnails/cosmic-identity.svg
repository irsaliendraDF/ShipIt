<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Cosmic Identity — astrology, zodiac, numerology, Human Design, MBTI">
  <defs>
    <linearGradient id="ci-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <radialGradient id="ci-sky" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#3a2766"/>
      <stop offset="60%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <radialGradient id="ci-planet" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff7a3d"/>
      <stop offset="100%" stop-color="#ff6fb5"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#ci-bg)"/>

  <!-- night sky panel -->
  <rect x="80" y="60" width="640" height="330" rx="14" fill="url(#ci-sky)" stroke="#1a1a1a" stroke-width="3"/>

  <!-- star field -->
  <g fill="#fde9c8">
    <circle cx="130" cy="100" r="1.5"/>
    <circle cx="170" cy="160" r="1"/>
    <circle cx="220" cy="110" r="1.2"/>
    <circle cx="290" cy="90" r="1.5"/>
    <circle cx="350" cy="135" r="1"/>
    <circle cx="430" cy="95" r="1.5"/>
    <circle cx="500" cy="140" r="1"/>
    <circle cx="560" cy="100" r="1.2"/>
    <circle cx="620" cy="150" r="1.5"/>
    <circle cx="680" cy="105" r="1"/>
    <circle cx="150" cy="280" r="1.2"/>
    <circle cx="250" cy="320" r="1"/>
    <circle cx="380" cy="335" r="1.5"/>
    <circle cx="510" cy="310" r="1"/>
    <circle cx="640" cy="280" r="1.5"/>
    <circle cx="690" cy="350" r="1.2"/>
  </g>

  <!-- bright stars (4-point twinkle) -->
  <g stroke="#fde9c8" stroke-width="1" fill="#fde9c8">
    <g transform="translate(170 220)">
      <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z"/>
    </g>
    <g transform="translate(630 220)">
      <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z"/>
    </g>
    <g transform="translate(280 360)">
      <path d="M 0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z"/>
    </g>
  </g>

  <!-- zodiac wheel — centered -->
  <g transform="translate(400 225)">
    <!-- outer wheel ring -->
    <circle r="135" fill="none" stroke="#ff6fb5" stroke-width="2.5"/>
    <circle r="110" fill="none" stroke="#ff7a3d" stroke-width="2"/>
    <circle r="85" fill="none" stroke="#ff6fb5" stroke-width="1.5" stroke-dasharray="4 5"/>
    <!-- 12 spokes -->
    <g stroke="#fde9c8" stroke-width="1.5" opacity="0.85">
      <line x1="0" y1="-135" x2="0" y2="-85"/>
      <line x1="67" y1="-117" x2="42" y2="-73"/>
      <line x1="117" y1="-67" x2="73" y2="-42"/>
      <line x1="135" y1="0" x2="85" y2="0"/>
      <line x1="117" y1="67" x2="73" y2="42"/>
      <line x1="67" y1="117" x2="42" y2="73"/>
      <line x1="0" y1="135" x2="0" y2="85"/>
      <line x1="-67" y1="117" x2="-42" y2="73"/>
      <line x1="-117" y1="67" x2="-73" y2="42"/>
      <line x1="-135" y1="0" x2="-85" y2="0"/>
      <line x1="-117" y1="-67" x2="-73" y2="-42"/>
      <line x1="-67" y1="-117" x2="-42" y2="-73"/>
    </g>
    <!-- zodiac glyph dots in the houses -->
    <g fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1">
      <circle cx="0" cy="-110" r="5"/>
      <circle cx="55" cy="-95" r="5"/>
      <circle cx="95" cy="-55" r="5"/>
      <circle cx="110" cy="0" r="5"/>
      <circle cx="95" cy="55" r="5"/>
      <circle cx="55" cy="95" r="5"/>
      <circle cx="0" cy="110" r="5"/>
      <circle cx="-55" cy="95" r="5"/>
      <circle cx="-95" cy="55" r="5"/>
      <circle cx="-110" cy="0" r="5"/>
      <circle cx="-95" cy="-55" r="5"/>
      <circle cx="-55" cy="-95" r="5"/>
    </g>
    <!-- inner planet -->
    <circle r="38" fill="url(#ci-planet)" stroke="#1a1a1a" stroke-width="2"/>
    <!-- planet ring -->
    <ellipse cx="0" cy="0" rx="55" ry="14" fill="none" stroke="#fde9c8" stroke-width="2" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="55" ry="14" fill="none" stroke="#ff6fb5" stroke-width="1" opacity="0.7"/>
    <!-- center symbol -->
    <circle r="6" fill="#fde9c8"/>
    <circle r="2" fill="#1a1a1a"/>
  </g>

  <!-- constellation lines on left -->
  <g stroke="#ff7a3d" stroke-width="1.5" fill="#ff7a3d" opacity="0.9">
    <line x1="130" y1="200" x2="160" y2="245"/>
    <line x1="160" y1="245" x2="200" y2="270"/>
    <line x1="200" y1="270" x2="180" y2="320"/>
    <line x1="180" y1="320" x2="220" y2="350"/>
    <circle cx="130" cy="200" r="3"/>
    <circle cx="160" cy="245" r="3"/>
    <circle cx="200" cy="270" r="3"/>
    <circle cx="180" cy="320" r="3"/>
    <circle cx="220" cy="350" r="3"/>
  </g>

  <!-- five-framework chips around the wheel -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="700" text-anchor="middle">
    <g>
      <rect x="555" y="115" width="68" height="20" rx="10" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="589" y="129" fill="#1a1a1a">ASTRO</text>
    </g>
    <g>
      <rect x="595" y="170" width="78" height="20" rx="10" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="634" y="184" fill="#1a1a1a">ZODIAC</text>
    </g>
    <g>
      <rect x="595" y="225" width="88" height="20" rx="10" fill="#fde9c8" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="639" y="239" fill="#1a1a1a">NUMERO</text>
    </g>
    <g>
      <rect x="585" y="280" width="98" height="20" rx="10" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="634" y="294" fill="#1a1a1a">HUMAN DSGN</text>
    </g>
    <g>
      <rect x="595" y="335" width="68" height="20" rx="10" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1.5"/>
      <text x="629" y="349" fill="#1a1a1a">MBTI</text>
    </g>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1a1a1a" letter-spacing="2">
    <text x="32" y="42" font-weight="700">// COSMIC.ID</text>
    <text x="32" y="62" font-size="11" fill-opacity="0.65">5.frameworks</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">
    <text x="768" y="42" font-weight="700">[ ANTHROPIC ]</text>
    <text x="768" y="62" fill-opacity="0.65">astrologer.api</text>
  </g>

  <rect x="80" y="402" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="3" text-anchor="middle">
    <text x="400" y="422" font-weight="700">ASTRO + ZODIAC + NUMEROLOGY + HUMAN DESIGN + MBTI</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
