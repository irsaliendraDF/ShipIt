<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Cinematic Gesture FX — Iron Man repulsors and Dr Strange portals">
  <defs>
    <linearGradient id="cgfx-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="cgfx-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a1f3d"/>
    </linearGradient>
    <radialGradient id="cgfx-repulsor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="35%" stop-color="#ff7a3d"/>
      <stop offset="75%" stop-color="#ff6fb5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6fb5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cgfx-portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a3d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff7a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#cgfx-bg)"/>

  <!-- dark stage panel -->
  <rect x="80" y="60" width="640" height="330" rx="14" fill="url(#cgfx-panel)" stroke="#1a1a1a" stroke-width="3"/>

  <!-- Dr Strange portal -->
  <g transform="translate(580 225)">
    <circle r="105" fill="url(#cgfx-portal)"/>
    <g fill="none" stroke="#ff7a3d" stroke-width="3">
      <circle r="92"/>
      <circle r="75" stroke-width="2" stroke-dasharray="5 4"/>
      <circle r="60" stroke-width="1.5" stroke-dasharray="2 5"/>
    </g>
    <g stroke="#fde9c8" stroke-width="2.5">
      <line x1="0" y1="-100" x2="0" y2="-86"/>
      <line x1="71" y1="-71" x2="62" y2="-62"/>
      <line x1="100" y1="0" x2="86" y2="0"/>
      <line x1="71" y1="71" x2="62" y2="62"/>
      <line x1="0" y1="100" x2="0" y2="86"/>
      <line x1="-71" y1="71" x2="-62" y2="62"/>
      <line x1="-100" y1="0" x2="-86" y2="0"/>
      <line x1="-71" y1="-71" x2="-62" y2="-62"/>
    </g>
    <g fill="none" stroke="#fde9c8" stroke-width="1.5" opacity="0.9">
      <path d="M -50 0 Q -28 -40, 18 -38 Q 50 -10, 28 28 Q 0 45, -28 28 Q -50 5, -50 0"/>
      <path d="M -36 0 Q -18 -28, 14 -26 Q 35 -5, 20 20 Q 0 32, -20 20 Q -36 5, -36 0"/>
    </g>
  </g>

  <!-- Iron Man hand with repulsor blast -->
  <g transform="translate(220 235)">
    <!-- forearm -->
    <rect x="-32" y="40" width="64" height="120" rx="6" fill="#fde9c8" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="-32" y="40" width="64" height="14" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="-32" y="78" width="64" height="6" fill="#ff6fb5"/>
    <!-- palm -->
    <path d="M -40 50 Q -47 -18, -20 -32 Q 0 -40, 20 -32 Q 47 -18, 40 50 Q 30 65, 0 65 Q -30 65, -40 50 Z"
          fill="#fde9c8" stroke="#1a1a1a" stroke-width="2"/>
    <path d="M -40 5 Q -56 16, -50 36 Q -45 46, -38 40" fill="#fde9c8" stroke="#1a1a1a" stroke-width="2"/>
    <!-- repulsor glow -->
    <circle r="26" fill="url(#cgfx-repulsor)"/>
    <circle r="12" fill="#fde9c8" stroke="#1a1a1a" stroke-width="2"/>
    <circle r="6" fill="#ff7a3d"/>
    <!-- finger pad dots -->
    <g fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1">
      <circle cx="-18" cy="-22" r="3"/>
      <circle cx="0" cy="-30" r="3"/>
      <circle cx="18" cy="-22" r="3"/>
    </g>
    <!-- energy beam -->
    <g>
      <path d="M 22 0 L 340 -10 L 340 10 Z" fill="url(#cgfx-repulsor)" opacity="0.85"/>
      <line x1="22" y1="0" x2="360" y2="-4" stroke="#fde9c8" stroke-width="4" stroke-linecap="round"/>
      <line x1="22" y1="-2" x2="330" y2="-14" stroke="#ff7a3d" stroke-width="2"/>
      <line x1="22" y1="2" x2="330" y2="14" stroke="#ff6fb5" stroke-width="2"/>
    </g>
    <g fill="#fde9c8">
      <circle cx="100" cy="-6" r="3"/>
      <circle cx="180" cy="4" r="2.5"/>
      <circle cx="240" cy="-3" r="2.5"/>
      <circle cx="290" cy="5" r="3"/>
    </g>
  </g>

  <!-- spider web mark -->
  <g transform="translate(125 360)" stroke="#fde9c8" stroke-width="2" fill="none" opacity="0.85">
    <path d="M -28 0 L 28 0"/>
    <path d="M 0 -28 L 0 28"/>
    <path d="M -20 -20 L 20 20"/>
    <path d="M -20 20 L 20 -20"/>
    <circle r="10"/>
    <circle r="20" stroke-dasharray="4 3"/>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1a1a1a" letter-spacing="2">
    <text x="32" y="42" font-weight="700">// CINEMATIC FX</text>
    <text x="32" y="62" font-size="11" fill-opacity="0.65">gesture.spell</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">
    <text x="768" y="42" font-weight="700">[ HAND.TRACK ]</text>
    <text x="768" y="62" fill-opacity="0.65">repulsor:ARMED</text>
  </g>

  <rect x="80" y="402" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="3" text-anchor="middle">
    <text x="400" y="422" font-weight="700">IRON MAN. DR STRANGE. SPIDER-MAN. CAST WITH YOUR HANDS.</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
