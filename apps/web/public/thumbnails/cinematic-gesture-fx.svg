<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Cinematic Gesture FX thumbnail">
  <defs>
    <radialGradient id="cgfx-bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#1c1726"/>
      <stop offset="60%" stop-color="#15101e"/>
      <stop offset="100%" stop-color="#08060e"/>
    </radialGradient>
    <radialGradient id="cgfx-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="#00ffe1" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#00b8a4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00ffe1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="cgfx-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="cgfx-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#cgfx-bg)"/>
  <rect width="800" height="450" fill="url(#cgfx-grid)"/>

  <!-- Repulsor aperture -->
  <g transform="translate(400 225)">
    <circle r="160" fill="url(#cgfx-core)" filter="url(#cgfx-blur)" opacity="0.55"/>
    <circle r="120" fill="none" stroke="#00ffe1" stroke-width="1.5" stroke-opacity="0.4"/>
    <circle r="92" fill="none" stroke="#00ffe1" stroke-width="2" stroke-opacity="0.65"/>
    <circle r="64" fill="none" stroke="#00ffe1" stroke-width="2.5" stroke-opacity="0.85"/>
    <circle r="36" fill="#00ffe1" fill-opacity="0.18" stroke="#00ffe1" stroke-width="1.5"/>
    <circle r="14" fill="#ffffff" fill-opacity="0.95"/>
    <!-- Aperture spokes -->
    <g stroke="#00ffe1" stroke-width="1" stroke-opacity="0.7">
      <line x1="-150" y1="0" x2="-100" y2="0"/>
      <line x1="100" y1="0" x2="150" y2="0"/>
      <line x1="0" y1="-150" x2="0" y2="-100"/>
      <line x1="0" y1="100" x2="0" y2="150"/>
      <line x1="-110" y1="-110" x2="-75" y2="-75"/>
      <line x1="75" y1="-75" x2="110" y2="-110"/>
      <line x1="-110" y1="110" x2="-75" y2="75"/>
      <line x1="75" y1="75" x2="110" y2="110"/>
    </g>
  </g>

  <!-- Sparks -->
  <g fill="#ff8a3d">
    <circle cx="180" cy="120" r="2"/>
    <circle cx="640" cy="140" r="1.5"/>
    <circle cx="200" cy="340" r="1.8"/>
    <circle cx="620" cy="320" r="2.2"/>
    <circle cx="120" cy="220" r="1.5"/>
    <circle cx="700" cy="260" r="1.5"/>
  </g>

  <!-- HUD label -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#00ffe1" fill-opacity="0.75" letter-spacing="2">
    <text x="32" y="40">// CINEMATIC_FX</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ff8a3d" fill-opacity="0.7" letter-spacing="2.5">
    <text x="32" y="60">REPULSOR.READY</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ffffff" fill-opacity="0.45" letter-spacing="2" text-anchor="end">
    <text x="768" y="40">[ MEDIAPIPE ]</text>
    <text x="768" y="60" fill="#ff8a3d" fill-opacity="0.7">▲ LIVE</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00ffe1" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
