<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Pocket Post — drop a note in the mailbox, share the code" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="pp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="pp-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#pp-bg)"/>

  <!-- dark stage panel -->
  <rect x="80" y="60" width="640" height="330" rx="14" fill="url(#pp-panel)" stroke="#1a1a1a" stroke-width="3"/>

  <!-- top-left header -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1a1a1a" letter-spacing="2">
    <text x="32" y="42" font-weight="700">// POCKET POST</text>
    <text x="32" y="62" font-size="11" fill-opacity="0.65">notes too cute for texts</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">
    <text x="768" y="42" font-weight="700">[ EST 1994 ]</text>
    <text x="768" y="62" fill-opacity="0.65">share the code</text>
  </g>

  <!-- stamp pill, top center of stage -->
  <g transform="translate(400 90)">
    <rect x="-58" y="-14" width="116" height="28" rx="14" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#1a1a1a" letter-spacing="2">★ AIR MAIL ★</text>
  </g>

  <!-- tracking code, top right -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="2" text-anchor="end">
    <text x="690" y="100" fill-opacity="0.7">CODE</text>
    <text x="690" y="120" font-size="18" font-weight="700">PP-1994</text>
  </g>

  <!-- MAILBOX on left of stage, pixelated -->
  <g shape-rendering="crispEdges">
    <!-- shadow under shelf -->
    <ellipse cx="240" cy="332" rx="92" ry="6" fill="#000" opacity="0.4"/>
    <!-- shelf -->
    <rect x="148" y="318" width="184" height="14" rx="3" fill="#8b5cf6" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="160" y="324" width="4" height="4" fill="#fde9c8"/>
    <rect x="184" y="324" width="4" height="4" fill="#ff7a3d"/>
    <rect x="208" y="324" width="4" height="4" fill="#fde9c8"/>
    <rect x="232" y="324" width="4" height="4" fill="#ff7a3d"/>
    <rect x="256" y="324" width="4" height="4" fill="#fde9c8"/>
    <rect x="280" y="324" width="4" height="4" fill="#ff7a3d"/>
    <rect x="304" y="324" width="4" height="4" fill="#fde9c8"/>

    <!-- post -->
    <rect x="232" y="290" width="16" height="28" fill="#8b5cf6" stroke="#1a1a1a" stroke-width="2"/>

    <!-- mailbox body (pink, arched top via stacked rects) -->
    <rect x="170" y="220" width="140" height="74" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="3"/>
    <!-- arched top approximated as steps -->
    <rect x="178" y="212" width="124" height="8" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="3"/>
    <rect x="190" y="204" width="100" height="8" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="3"/>
    <rect x="206" y="196" width="68" height="8" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="3"/>

    <!-- eyes -->
    <rect x="208" y="218" width="10" height="12" fill="#faf7f0" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="262" y="218" width="10" height="12" fill="#faf7f0" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="212" y="222" width="4" height="6" fill="#1a1a1a"/>
    <rect x="266" y="222" width="4" height="6" fill="#1a1a1a"/>
    <!-- smile -->
    <path d="M 226 238 Q 240 250 254 238" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- blush -->
    <rect x="194" y="232" width="8" height="3" fill="#ff7a3d" opacity="0.8"/>
    <rect x="278" y="232" width="8" height="3" fill="#ff7a3d" opacity="0.8"/>

    <!-- door slot with label K7 -->
    <rect x="194" y="252" width="92" height="34" fill="#faf7f0" stroke="#1a1a1a" stroke-width="2"/>
    <text x="240" y="276" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="16" font-weight="700" fill="#8b5cf6">K7!</text>
    <!-- door knob -->
    <rect x="272" y="266" width="6" height="6" fill="#ffd54f" stroke="#1a1a1a" stroke-width="1.5"/>

    <!-- flag on right -->
    <rect x="310" y="232" width="3" height="32" fill="#8b5cf6"/>
    <polygon points="313,236 336,236 328,248 336,260 313,260" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="2"/>
    <text x="320" y="252" font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="700" fill="#faf7f0">★</text>
  </g>

  <!-- LETTER floating in the air on the right, tilted -->
  <g transform="translate(530 230) rotate(-6)">
    <!-- rainbow border via concentric rects -->
    <rect x="-110" y="-78" width="220" height="156" fill="#8b5cf6" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="-104" y="-72" width="208" height="144" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="-98"  y="-66" width="196" height="132" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="-92"  y="-60" width="184" height="120" fill="#faf7f0" stroke="#1a1a1a" stroke-width="2"/>
    <!-- stamp on letter -->
    <rect x="-84" y="-52" width="32" height="40" fill="#ff6fb5" stroke="#faf7f0" stroke-width="3"/>
    <rect x="-86" y="-54" width="36" height="44" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="-68" y="-28" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="700" fill="#faf7f0">★</text>
    <!-- ruled lines (note body) -->
    <line x1="-40" y1="-46" x2="84" y2="-46" stroke="#ff6fb5" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="-80" y1="-12" x2="84" y2="-12" stroke="#ff6fb5" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="-80" y1="6"   x2="84" y2="6"   stroke="#ff6fb5" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="-80" y1="24"  x2="84" y2="24"  stroke="#ff6fb5" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- handwritten "hi u!" -->
    <text x="-78" y="-22" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="16" font-weight="700" fill="#ff6fb5">dear u,</text>
    <text x="-70" y="2"   font-family="Fraunces, Georgia, serif" font-style="italic" font-size="13" fill="#1a1a1a">hi! ♥</text>
    <text x="0"   y="48"  font-family="Fraunces, Georgia, serif" font-style="italic" font-size="13" fill="#ff7a3d" text-anchor="middle">— me</text>
    <!-- sticker seal -->
    <g transform="translate(78 50)">
      <polygon points="0,-14 4,-6 12,-6 6,0 8,10 0,5 -8,10 -6,0 -12,-6 -4,-6" fill="#ffd54f" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
  </g>

  <!-- floating sparkles around -->
  <g shape-rendering="crispEdges">
    <text x="120" y="120" font-family="ui-monospace, Menlo, monospace" font-size="16" font-weight="700" fill="#ffd54f">★</text>
    <text x="160" y="160" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700" fill="#ff6fb5">♥</text>
    <text x="660" y="140" font-family="ui-monospace, Menlo, monospace" font-size="16" font-weight="700" fill="#8b5cf6">✦</text>
    <text x="680" y="320" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="700" fill="#ff7a3d">★</text>
    <text x="110" y="310" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700" fill="#fde9c8">✦</text>
  </g>

  <!-- bottom strap -->
  <rect x="80" y="402" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="3" text-anchor="middle">
    <text x="400" y="422" font-weight="700">WRITE A NOTE. DROP IT IN. SHARE THE CODE.</text>
  </g>

  <!-- corner brackets -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
