<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Pokemon Nova Scotia — Game Boy-styled exploration" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="pn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#pn-bg)"/>

  <!-- Game Boy body in jet so it has strong contrast against cream -->
  <g>
    <rect x="120" y="50" width="560" height="360" rx="18" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="3"/>
    <!-- bezel -->
    <rect x="150" y="80" width="500" height="270" rx="6" fill="#2a1f3d"/>
    <!-- the screen -->
    <rect x="170" y="100" width="460" height="230" fill="#fde9c8" stroke="#fde9c8" stroke-width="0"/>

    <g shape-rendering="crispEdges">
      <!-- ocean band -->
      <rect x="170" y="280" width="460" height="50" fill="#8b5cf6"/>
      <!-- wave dashes -->
      <g fill="#1a1a1a">
        <rect x="190" y="295" width="10" height="3"/>
        <rect x="260" y="310" width="10" height="3"/>
        <rect x="340" y="295" width="10" height="3"/>
        <rect x="430" y="310" width="10" height="3"/>
        <rect x="520" y="295" width="10" height="3"/>
        <rect x="580" y="310" width="10" height="3"/>
      </g>

      <!-- grass band -->
      <rect x="170" y="240" width="460" height="40" fill="#ff7a3d"/>
      <g fill="#1a1a1a">
        <rect x="200" y="255" width="3" height="6"/>
        <rect x="240" y="260" width="3" height="6"/>
        <rect x="290" y="252" width="3" height="6"/>
        <rect x="370" y="258" width="3" height="6"/>
        <rect x="450" y="252" width="3" height="6"/>
        <rect x="520" y="260" width="3" height="6"/>
        <rect x="590" y="255" width="3" height="6"/>
      </g>

      <!-- lighthouse on right (Peggy's Cove style) -->
      <g>
        <!-- rocky base -->
        <rect x="530" y="220" width="80" height="22" fill="#1a1a1a"/>
        <rect x="540" y="210" width="60" height="10" fill="#1a1a1a"/>
        <!-- tower -->
        <rect x="556" y="160" width="28" height="52" fill="#faf7f0" stroke="#1a1a1a" stroke-width="2"/>
        <!-- red stripe -->
        <rect x="556" y="178" width="28" height="14" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="2"/>
        <!-- lantern room -->
        <rect x="552" y="146" width="36" height="16" fill="#1a1a1a"/>
        <rect x="560" y="150" width="20" height="10" fill="#ff7a3d"/>
        <!-- roof -->
        <polygon points="552,146 588,146 570,134" fill="#1a1a1a"/>
        <!-- light beam -->
        <polygon points="588,155 700,118 700,180" fill="#ff7a3d" opacity="0.55"/>
      </g>

      <!-- pixel pine trees on left -->
      <g>
        <rect x="200" y="200" width="6" height="44" fill="#1a1a1a"/>
        <polygon points="178,225 228,225 203,180" fill="#1a1a1a"/>
        <polygon points="184,205 222,205 203,170" fill="#1a1a1a"/>
        <rect x="248" y="210" width="5" height="32" fill="#1a1a1a"/>
        <polygon points="230,228 270,228 250,195" fill="#1a1a1a"/>
      </g>

      <!-- player sprite (jet outlined for contrast) -->
      <g transform="translate(360 230)">
        <!-- hat -->
        <rect x="-9" y="-15" width="18" height="4" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1"/>
        <rect x="-11" y="-12" width="22" height="3" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1"/>
        <!-- face -->
        <rect x="-7" y="-9" width="14" height="8" fill="#fde9c8" stroke="#1a1a1a" stroke-width="1.2"/>
        <rect x="-4" y="-6" width="2" height="2" fill="#1a1a1a"/>
        <rect x="2" y="-6" width="2" height="2" fill="#1a1a1a"/>
        <!-- shirt -->
        <rect x="-9" y="-1" width="18" height="11" fill="#ff6fb5" stroke="#1a1a1a" stroke-width="1.2"/>
        <!-- legs -->
        <rect x="-7" y="10" width="5" height="6" fill="#8b5cf6" stroke="#1a1a1a" stroke-width="1"/>
        <rect x="2" y="10" width="5" height="6" fill="#8b5cf6" stroke="#1a1a1a" stroke-width="1"/>
      </g>

      <!-- dialog box -->
      <rect x="180" y="298" width="440" height="24" fill="#faf7f0" stroke="#1a1a1a" stroke-width="2"/>
      <g font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#1a1a1a">
        <text x="190" y="313" font-weight="700">A wild SCALLOP appeared!</text>
        <text x="610" y="313" text-anchor="end" font-weight="700">▼</text>
      </g>
    </g>

    <!-- D-pad and buttons -->
    <g>
      <g transform="translate(200 380)" fill="#fde9c8" stroke="#fde9c8" stroke-width="0">
        <rect x="-22" y="-6" width="44" height="12"/>
        <rect x="-6" y="-22" width="12" height="44"/>
      </g>
      <g stroke="#1a1a1a" stroke-width="1.5">
        <circle cx="540" cy="378" r="14" fill="#ff6fb5"/>
        <circle cx="590" cy="378" r="14" fill="#ff7a3d"/>
      </g>
      <g font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#1a1a1a" font-weight="700" text-anchor="middle">
        <text x="540" y="383">B</text>
        <text x="590" y="383">A</text>
      </g>
      <g fill="#fde9c8">
        <rect x="320" y="378" width="36" height="6" rx="3"/>
        <rect x="370" y="378" width="36" height="6" rx="3"/>
      </g>
    </g>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1a1a1a" letter-spacing="2">
    <text x="32" y="42" font-weight="700">// POKEMON.NS</text>
    <text x="32" y="62" font-size="11" fill-opacity="0.65">gameboy.explore</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">
    <text x="768" y="42" font-weight="700">[ Z = TALK ]</text>
    <text x="768" y="62" fill-opacity="0.65">arrows.move</text>
  </g>

  <rect x="80" y="402" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="3" text-anchor="middle">
    <text x="400" y="422" font-weight="700">GAME BOY-STYLED NOVA SCOTIA. WALK, TALK, EXPLORE.</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
