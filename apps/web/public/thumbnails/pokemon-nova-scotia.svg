<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Pokemon Nova Scotia thumbnail" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="pn-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1726"/>
      <stop offset="100%" stop-color="#0d0a14"/>
    </linearGradient>
    <linearGradient id="pn-cab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2034"/>
      <stop offset="100%" stop-color="#1a1422"/>
    </linearGradient>
    <linearGradient id="pn-screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9bbc0f"/>
      <stop offset="100%" stop-color="#5a8a0b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#pn-bg)" shape-rendering="auto"/>

  <!-- Game Boy cabinet body -->
  <g shape-rendering="auto">
    <rect x="240" y="50" width="320" height="350" rx="14" fill="url(#pn-cab)" stroke="#3a2f48" stroke-width="2"/>
    <!-- POWER LED -->
    <circle cx="270" cy="370" r="4" fill="#ff8a3d"/>
    <text x="282" y="374" font-family="ui-monospace, monospace" font-size="9" fill="#ff8a3d" letter-spacing="1.5">POWER</text>
    <!-- Brand text -->
    <text x="400" y="80" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#ffffff" fill-opacity="0.85" letter-spacing="2">POK<tspan fill="#ff8a3d">e</tspan>MON NOVA SCOTIA</text>
    <!-- Screen frame -->
    <rect x="265" y="100" width="270" height="220" rx="6" fill="#0d0a14" stroke="#3a2f48" stroke-width="2"/>
  </g>

  <!-- Game Boy screen -->
  <g transform="translate(285 120)">
    <rect width="230" height="180" fill="url(#pn-screen)" shape-rendering="auto"/>

    <!-- Tile grid (subtle) -->
    <g stroke="#9bbc0f" stroke-opacity="0.0">
      <!-- Grass tiles top half -->
    </g>

    <!-- Path/road -->
    <g fill="#cdd87a">
      <rect x="80" y="80" width="70" height="10"/>
      <rect x="100" y="90" width="50" height="10"/>
      <rect x="100" y="100" width="50" height="50"/>
    </g>

    <!-- Tree blocks (pixel) -->
    <g fill="#306030">
      <!-- top-left tree -->
      <rect x="20" y="20" width="20" height="20"/>
      <rect x="15" y="25" width="30" height="10"/>
      <!-- top-right tree -->
      <rect x="180" y="20" width="20" height="20"/>
      <rect x="175" y="25" width="30" height="10"/>
      <!-- bottom-left tree -->
      <rect x="20" y="140" width="20" height="20"/>
      <rect x="15" y="145" width="30" height="10"/>
      <!-- bottom-right tree -->
      <rect x="180" y="140" width="20" height="20"/>
      <rect x="175" y="145" width="30" height="10"/>
    </g>
    <g fill="#0f380f">
      <rect x="22" y="36" width="16" height="6"/>
      <rect x="182" y="36" width="16" height="6"/>
      <rect x="22" y="156" width="16" height="6"/>
      <rect x="182" y="156" width="16" height="6"/>
    </g>

    <!-- Coastline (Nova Scotia ocean to the east) -->
    <g fill="#4a8c50">
      <rect x="60" y="60" width="10" height="10"/>
      <rect x="70" y="50" width="10" height="10"/>
      <rect x="160" y="60" width="10" height="10"/>
      <rect x="50" y="120" width="10" height="10"/>
      <rect x="170" y="120" width="10" height="10"/>
    </g>

    <!-- Player character (pixel sprite, facing down) -->
    <g transform="translate(108 78)" fill="#0f380f">
      <!-- Hat -->
      <rect x="3" y="0" width="8" height="2"/>
      <rect x="2" y="2" width="10" height="3"/>
      <!-- Face/body -->
      <rect x="3" y="5" width="8" height="2"/>
      <rect x="2" y="7" width="10" height="6"/>
      <!-- Legs -->
      <rect x="3" y="13" width="3" height="3"/>
      <rect x="8" y="13" width="3" height="3"/>
    </g>
    <!-- Cap accent -->
    <g transform="translate(108 78)" fill="#ff8a3d">
      <rect x="3" y="2" width="8" height="2"/>
    </g>

    <!-- Dialog box -->
    <g>
      <rect x="20" y="155" width="190" height="20" fill="#0f380f"/>
      <rect x="22" y="157" width="186" height="16" fill="none" stroke="#9bbc0f" stroke-width="1"/>
      <text x="28" y="169" font-family="ui-monospace, monospace" font-size="8" fill="#9bbc0f" letter-spacing="1">A WILD POKE-NS APPEARS!</text>
    </g>

    <!-- Scanline overlay subtle -->
    <g fill="#0f380f" fill-opacity="0.08">
      <rect width="230" y="0" height="2"/>
      <rect width="230" y="6" height="2"/>
      <rect width="230" y="12" height="2"/>
      <rect width="230" y="18" height="2"/>
      <rect width="230" y="24" height="2"/>
      <rect width="230" y="30" height="2"/>
    </g>
  </g>

  <!-- D-pad and buttons (faux) -->
  <g shape-rendering="auto">
    <!-- D-pad -->
    <g fill="#1a1422" stroke="#3a2f48" stroke-width="1.5">
      <rect x="285" y="335" width="50" height="14"/>
      <rect x="303" y="320" width="14" height="44"/>
    </g>
    <!-- A B buttons -->
    <circle cx="475" cy="340" r="11" fill="#00ffe1" stroke="#0d0a14" stroke-width="1.5"/>
    <text x="475" y="344" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#0d0a14">A</text>
    <circle cx="510" cy="350" r="11" fill="#ff8a3d" stroke="#0d0a14" stroke-width="1.5"/>
    <text x="510" y="354" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#0d0a14">B</text>
  </g>

  <!-- HUD labels -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#00ffe1" fill-opacity="0.75" letter-spacing="2">
    <text x="32" y="40">// POKEMON_NS</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ffffff" fill-opacity="0.45" letter-spacing="2.5">
    <text x="32" y="60">8.BIT.EXPLORATION</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ff8a3d" fill-opacity="0.75" letter-spacing="2" text-anchor="end">
    <text x="768" y="40">[ GAMEBOY ]</text>
    <text x="768" y="60" fill="#00ffe1" fill-opacity="0.65">▲ READY</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00ffe1" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
