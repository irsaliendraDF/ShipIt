<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="WhisperGrove thumbnail" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="wg-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1726"/>
      <stop offset="100%" stop-color="#0d0a14"/>
    </linearGradient>
    <radialGradient id="wg-moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffe1" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#00b8a4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ffe1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#wg-bg)" shape-rendering="auto"/>

  <!-- Stars -->
  <g fill="#ffffff" fill-opacity="0.8">
    <rect x="120" y="60" width="2" height="2"/>
    <rect x="240" y="40" width="2" height="2"/>
    <rect x="380" y="70" width="2" height="2"/>
    <rect x="520" y="50" width="2" height="2"/>
    <rect x="640" y="80" width="2" height="2"/>
    <rect x="700" y="40" width="2" height="2"/>
    <rect x="80" y="100" width="2" height="2"/>
    <rect x="180" y="120" width="2" height="2"/>
    <rect x="320" y="120" width="2" height="2"/>
    <rect x="600" y="120" width="2" height="2"/>
    <rect x="60" y="160" width="2" height="2"/>
    <rect x="740" y="170" width="2" height="2"/>
  </g>

  <!-- Moon -->
  <circle cx="630" cy="120" r="48" fill="url(#wg-moon)" shape-rendering="auto"/>
  <g shape-rendering="auto" fill="#00ffe1">
    <circle cx="630" cy="120" r="22" fill-opacity="0.85"/>
    <circle cx="624" cy="114" r="3" fill="#0d0a14" fill-opacity="0.6"/>
    <circle cx="638" cy="125" r="2" fill="#0d0a14" fill-opacity="0.5"/>
  </g>

  <!-- Grove silhouette (pixel trees) -->
  <g fill="#00b8a4" fill-opacity="0.35">
    <rect x="0" y="320" width="800" height="130"/>
  </g>
  <g fill="#15101e">
    <!-- tree 1 -->
    <rect x="60" y="280" width="20" height="50"/>
    <rect x="50" y="270" width="40" height="20"/>
    <rect x="40" y="260" width="60" height="20"/>
    <rect x="50" y="250" width="40" height="10"/>
    <!-- tree 2 -->
    <rect x="140" y="290" width="16" height="40"/>
    <rect x="130" y="280" width="36" height="20"/>
    <rect x="120" y="270" width="56" height="15"/>
    <!-- tree 3 -->
    <rect x="700" y="280" width="20" height="50"/>
    <rect x="690" y="270" width="40" height="20"/>
    <rect x="680" y="260" width="60" height="20"/>
    <rect x="690" y="250" width="40" height="10"/>
  </g>

  <!-- Pixel egg / drake (Rosie). 8-bit sprite, ~20px units -->
  <g transform="translate(360 220)">
    <!-- Egg/body warm orange with cyan spots -->
    <g fill="#ff8a3d">
      <rect x="20" y="0"  width="40" height="10"/>
      <rect x="10" y="10" width="60" height="10"/>
      <rect x="0"  y="20" width="80" height="10"/>
      <rect x="0"  y="30" width="80" height="20"/>
      <rect x="0"  y="50" width="80" height="20"/>
      <rect x="10" y="70" width="60" height="10"/>
      <rect x="20" y="80" width="40" height="10"/>
    </g>
    <!-- Highlights (warm glow) -->
    <g fill="#ffb377">
      <rect x="20" y="10" width="20" height="10"/>
      <rect x="10" y="20" width="20" height="10"/>
      <rect x="20" y="30" width="10" height="10"/>
    </g>
    <!-- Cyan zigzag spots -->
    <g fill="#00ffe1" fill-opacity="0.85">
      <rect x="40" y="40" width="10" height="10"/>
      <rect x="30" y="50" width="10" height="10"/>
      <rect x="50" y="60" width="10" height="10"/>
    </g>
    <!-- Eyes -->
    <g fill="#0d0a14">
      <rect x="20" y="40" width="6" height="10"/>
      <rect x="55" y="40" width="6" height="10"/>
    </g>
    <g fill="#ffffff">
      <rect x="22" y="40" width="2" height="3"/>
      <rect x="57" y="40" width="2" height="3"/>
    </g>
    <!-- Tiny smile -->
    <rect x="34" y="62" width="12" height="3" fill="#0d0a14"/>
  </g>

  <!-- Sparkles around drake -->
  <g fill="#d6ff3a">
    <rect x="340" y="200" width="3" height="3"/>
    <rect x="448" y="218" width="3" height="3"/>
    <rect x="350" y="320" width="3" height="3"/>
    <rect x="455" y="305" width="3" height="3"/>
    <rect x="320" y="260" width="2" height="2"/>
    <rect x="468" y="262" width="2" height="2"/>
  </g>

  <!-- HUD labels -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#ff8a3d" fill-opacity="0.85" letter-spacing="2">
    <text x="32" y="40">// WHISPERGROVE</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ffffff" fill-opacity="0.45" letter-spacing="2.5">
    <text x="32" y="60">RAISE.A.DRAKE</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#00ffe1" fill-opacity="0.65" letter-spacing="2" text-anchor="end">
    <text x="768" y="40">[ ROSIE.L1 ]</text>
    <text x="768" y="60" fill="#ff8a3d" fill-opacity="0.75">♥ FED</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#ff8a3d" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
