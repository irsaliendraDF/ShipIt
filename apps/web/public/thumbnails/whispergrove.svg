<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="WhisperGrove — Tamagotchi-style drake raiser" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="wg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#wg-bg)"/>

  <g>
    <!-- Tamagotchi shell — pink with jet outline so it pops -->
    <path d="M 400 50 Q 250 60, 200 200 Q 180 320, 280 400 Q 400 440, 520 400 Q 620 320, 600 200 Q 550 60, 400 50 Z"
          fill="#ff6fb5" stroke="#1a1a1a" stroke-width="4"/>
    <!-- bezel ring -->
    <ellipse cx="400" cy="225" rx="180" ry="135" fill="#1a1a1a"/>
    <!-- screen (dark purple/jet so brand colors pop) -->
    <rect x="245" y="125" width="310" height="200" rx="6" fill="#2a1f3d" stroke="#1a1a1a" stroke-width="2"/>

    <g shape-rendering="crispEdges">
      <!-- ground band -->
      <rect x="247" y="278" width="306" height="45" fill="#8b5cf6"/>
      <g fill="#1a1a1a">
        <rect x="270" y="293" width="3" height="6"/>
        <rect x="320" y="298" width="3" height="6"/>
        <rect x="430" y="293" width="3" height="6"/>
        <rect x="500" y="298" width="3" height="6"/>
      </g>

      <!-- moon -->
      <circle cx="510" cy="155" r="16" fill="#fde9c8"/>
      <circle cx="514" cy="152" r="13" fill="#faf7f0"/>
      <!-- stars -->
      <g fill="#fde9c8">
        <rect x="290" y="150" width="2" height="2"/>
        <rect x="340" y="170" width="2" height="2"/>
        <rect x="380" y="145" width="2" height="2"/>
        <rect x="460" y="180" width="2" height="2"/>
      </g>

      <!-- pixel trees in cream so they read on dark screen -->
      <g>
        <rect x="280" y="240" width="4" height="40" fill="#fde9c8"/>
        <polygon points="262,265 302,265 282,230" fill="#fde9c8"/>
        <polygon points="268,250 296,250 282,220" fill="#fde9c8"/>
        <rect x="510" y="240" width="4" height="40" fill="#fde9c8"/>
        <polygon points="492,265 532,265 512,230" fill="#fde9c8"/>
      </g>

      <!-- Rosie the drake -->
      <g transform="translate(400 248)">
        <!-- tail -->
        <rect x="22" y="6" width="6" height="6" fill="#ff7a3d"/>
        <rect x="28" y="2" width="6" height="6" fill="#ff7a3d"/>
        <rect x="34" y="-2" width="6" height="6" fill="#ff6fb5"/>
        <rect x="38" y="-8" width="6" height="6" fill="#ff6fb5"/>
        <!-- body -->
        <rect x="-18" y="0" width="42" height="22" fill="#ff7a3d"/>
        <rect x="-16" y="-6" width="34" height="8" fill="#ff7a3d"/>
        <!-- belly -->
        <rect x="-12" y="14" width="30" height="8" fill="#fde9c8"/>
        <!-- legs -->
        <rect x="-14" y="22" width="6" height="8" fill="#1a1a1a"/>
        <rect x="14" y="22" width="6" height="8" fill="#1a1a1a"/>
        <!-- head -->
        <rect x="-32" y="-12" width="24" height="22" fill="#ff7a3d"/>
        <rect x="-36" y="-6" width="6" height="10" fill="#ff7a3d"/>
        <!-- snout -->
        <rect x="-40" y="-2" width="6" height="6" fill="#ff6fb5"/>
        <!-- eye -->
        <rect x="-22" y="-6" width="4" height="4" fill="#1a1a1a"/>
        <rect x="-21" y="-5" width="2" height="2" fill="#fde9c8"/>
        <!-- horn -->
        <rect x="-22" y="-18" width="4" height="6" fill="#fde9c8"/>
        <rect x="-20" y="-22" width="2" height="4" fill="#fde9c8"/>
        <!-- wings -->
        <rect x="0" y="-10" width="14" height="4" fill="#8b5cf6"/>
        <rect x="2" y="-14" width="10" height="4" fill="#8b5cf6"/>
      </g>

      <!-- hearts above Rosie -->
      <g fill="#ff6fb5" stroke="#fde9c8" stroke-width="0.5">
        <path d="M 360 200 q -2 -6, 4 -6 q 6 0, 6 6 q 0 4, -6 8 q -6 -4, -6 -8 Z"/>
        <path d="M 440 190 q -1 -4, 3 -4 q 4 0, 4 4 q 0 3, -4 6 q -4 -3, -4 -6 Z"/>
      </g>

      <!-- stat bars at bottom of screen -->
      <g>
        <rect x="258" y="332" width="40" height="8" fill="#1a1a1a" stroke="#fde9c8" stroke-width="0.5"/>
        <rect x="258" y="332" width="30" height="8" fill="#ff6fb5"/>
        <rect x="310" y="332" width="40" height="8" fill="#1a1a1a" stroke="#fde9c8" stroke-width="0.5"/>
        <rect x="310" y="332" width="20" height="8" fill="#ff7a3d"/>
        <rect x="362" y="332" width="40" height="8" fill="#1a1a1a" stroke="#fde9c8" stroke-width="0.5"/>
        <rect x="362" y="332" width="35" height="8" fill="#8b5cf6"/>
      </g>
    </g>

    <!-- action buttons (jet circles on the pink shell with cream letters) -->
    <g stroke="#fde9c8" stroke-width="2">
      <circle cx="340" cy="375" r="14" fill="#1a1a1a"/>
      <circle cx="400" cy="382" r="14" fill="#1a1a1a"/>
      <circle cx="460" cy="375" r="14" fill="#1a1a1a"/>
    </g>
    <g fill="#fde9c8" font-family="ui-monospace, Menlo, monospace" font-size="10" text-anchor="middle" font-weight="700">
      <text x="340" y="379">A</text>
      <text x="400" y="386">B</text>
      <text x="460" y="379">C</text>
    </g>
  </g>

  <!-- floating sparkles outside the device -->
  <g fill="#8b5cf6" stroke="#1a1a1a" stroke-width="1">
    <circle cx="120" cy="160" r="4"/>
    <circle cx="680" cy="180" r="4"/>
    <circle cx="160" cy="320" r="3.5"/>
    <circle cx="640" cy="340" r="3.5"/>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1a1a1a" letter-spacing="2">
    <text x="32" y="42" font-weight="700">// WHISPERGROVE</text>
    <text x="32" y="62" font-size="11" fill-opacity="0.65">raise.rosie</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">
    <text x="768" y="42" font-weight="700">[ DRAKE.LV 3 ]</text>
    <text x="768" y="62" fill-opacity="0.65">hp 28 / mp 12</text>
  </g>

  <rect x="80" y="402" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="3" text-anchor="middle">
    <text x="400" y="422" font-weight="700">FEED, PLAY, QUEST, EVOLVE. WATCH ROSIE GROW.</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
