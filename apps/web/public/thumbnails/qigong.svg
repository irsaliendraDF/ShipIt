<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Qi Gong — pose-tracked qigong">
  <defs>
    <linearGradient id="qg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde9c8"/>
      <stop offset="100%" stop-color="#faf7f0"/>
    </linearGradient>
    <linearGradient id="qg-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="qg-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7a3d" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#ff6fb5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#qg-bg)"/>

  <!-- dark stage panel so brand colors pop with high contrast -->
  <rect x="80" y="60" width="640" height="330" rx="14" fill="url(#qg-panel)" stroke="#1a1a1a" stroke-width="3"/>

  <!-- aura halo behind figure -->
  <ellipse cx="400" cy="230" rx="220" ry="170" fill="url(#qg-aura)"/>

  <!-- meditator silhouette in cream so it reads against dark panel -->
  <g transform="translate(400 235)" fill="#fde9c8" stroke="#1a1a1a" stroke-width="2">
    <circle cx="0" cy="-85" r="22"/>
    <path d="M -32 -55 Q -48 0, -58 55 Q 0 48, 58 55 Q 48 0, 32 -55 Q 16 -68, 0 -68 Q -16 -68, -32 -55 Z"/>
    <path d="M -80 65 Q -45 82, 0 78 Q 45 82, 80 65 Q 95 95, 55 105 Q 0 112, -55 105 Q -95 95, -80 65 Z"/>
  </g>

  <!-- pose-tracking skeleton -->
  <g transform="translate(400 235)" stroke="#ff6fb5" stroke-width="2.5" fill="none">
    <line x1="0" y1="-85" x2="0" y2="-45"/>
    <line x1="0" y1="-45" x2="-50" y2="-25"/>
    <line x1="0" y1="-45" x2="50" y2="-25"/>
    <line x1="-50" y1="-25" x2="-65" y2="20"/>
    <line x1="50" y1="-25" x2="65" y2="20"/>
    <line x1="0" y1="-45" x2="-25" y2="50"/>
    <line x1="0" y1="-45" x2="25" y2="50"/>
    <line x1="-25" y1="50" x2="-55" y2="95"/>
    <line x1="25" y1="50" x2="55" y2="95"/>
  </g>
  <g transform="translate(400 235)" fill="#ff7a3d" stroke="#1a1a1a" stroke-width="1.2">
    <circle cx="0" cy="-85" r="5"/>
    <circle cx="0" cy="-45" r="5"/>
    <circle cx="-50" cy="-25" r="5"/>
    <circle cx="50" cy="-25" r="5"/>
    <circle cx="-65" cy="20" r="5"/>
    <circle cx="65" cy="20" r="5"/>
    <circle cx="-25" cy="50" r="5"/>
    <circle cx="25" cy="50" r="5"/>
    <circle cx="-55" cy="95" r="5"/>
    <circle cx="55" cy="95" r="5"/>
  </g>

  <!-- qi rings -->
  <g transform="translate(400 235)" fill="none">
    <circle r="155" stroke="#ff6fb5" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="3 7"/>
    <circle r="195" stroke="#ff7a3d" stroke-opacity="0.5" stroke-width="1.5"/>
  </g>

  <!-- floating qi sparks -->
  <g fill="#ff7a3d">
    <circle cx="180" cy="120" r="3"/>
    <circle cx="620" cy="140" r="3"/>
    <circle cx="160" cy="320" r="3"/>
    <circle cx="640" cy="320" r="3"/>
  </g>
  <g fill="#fde9c8">
    <circle cx="260" cy="90" r="2"/>
    <circle cx="540" cy="100" r="2"/>
    <circle cx="120" cy="240" r="2.5"/>
    <circle cx="680" cy="240" r="2.5"/>
  </g>

  <!-- HUD labels in jet -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1a1a1a" letter-spacing="2">
    <text x="32" y="42" font-weight="700">// QIGONG</text>
    <text x="32" y="62" font-size="11" fill-opacity="0.65">pose.cultivation</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#1a1a1a" letter-spacing="2" text-anchor="end">
    <text x="768" y="42" font-weight="700">[ POSE.TRACK ]</text>
    <text x="768" y="62" fill-opacity="0.65">qi:flowing</text>
  </g>

  <!-- footer caption strip in jet -->
  <rect x="80" y="402" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#fde9c8" letter-spacing="3" text-anchor="middle">
    <text x="400" y="422" font-weight="700">CULTIVATE QI. SOLO OR DUO. MOVE YOUR BODY.</text>
  </g>

  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
