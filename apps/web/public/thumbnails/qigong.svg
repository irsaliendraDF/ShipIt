<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Qi Gong thumbnail">
  <defs>
    <radialGradient id="qg-bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#1c1726"/>
      <stop offset="60%" stop-color="#15101e"/>
      <stop offset="100%" stop-color="#08060e"/>
    </radialGradient>
    <radialGradient id="qg-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffe1" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#ff8a3d" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#00ffe1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="qg-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#d6ff3a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d6ff3a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="qg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="qg-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#qg-bg)"/>
  <rect width="800" height="450" fill="url(#qg-grid)"/>

  <!-- Soft halo behind figure -->
  <ellipse cx="400" cy="240" rx="220" ry="180" fill="url(#qg-aura)" filter="url(#qg-blur)"/>

  <!-- Giant 氣 hanzi behind everything (low-opacity watermark) -->
  <text x="400" y="320" text-anchor="middle"
        font-family="Noto Serif SC, serif"
        font-size="380" font-weight="900"
        fill="#00ffe1" fill-opacity="0.07"
        letter-spacing="0">氣</text>

  <!-- Concentric qi rings expanding outward -->
  <g transform="translate(400 240)" fill="none">
    <circle r="170" stroke="#00ffe1" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="2 6"/>
    <circle r="135" stroke="#ff8a3d" stroke-opacity="0.22" stroke-width="1"/>
    <circle r="100" stroke="#00ffe1" stroke-opacity="0.40" stroke-width="1.2"/>
  </g>

  <!-- Energy spiral (qi flowing) -->
  <g transform="translate(400 240)" fill="none" stroke-linecap="round">
    <path d="M -110 -10 Q -60 -90, 0 -100 T 110 -10 Q 70 70, 0 80 T -90 60"
          stroke="#00ffe1" stroke-width="2" stroke-opacity="0.55"/>
    <path d="M -90 0 Q -50 -70, 0 -80 T 90 0 Q 55 60, 0 70 T -75 50"
          stroke="#ff8a3d" stroke-width="1.5" stroke-opacity="0.45"/>
  </g>

  <!-- Meditating figure silhouette: head + crossed-leg lotus shape -->
  <g transform="translate(400 240)" fill="#0d0a14" stroke="#00ffe1" stroke-width="1.5" stroke-opacity="0.85">
    <!-- Body / torso (tear-drop shape) -->
    <path d="M -42 60 Q -50 0, 0 -10 Q 50 0, 42 60 Z" fill="#15101e"/>
    <!-- Head -->
    <circle cx="0" cy="-30" r="18" fill="#15101e"/>
    <!-- Lotus base (crossed legs) -->
    <path d="M -70 65 Q -45 80, 0 78 Q 45 80, 70 65 Q 50 92, 0 92 Q -50 92, -70 65 Z" fill="#15101e"/>
    <!-- Hands forming a mudra at the dantian -->
    <circle cx="0" cy="40" r="8" fill="url(#qg-core)" stroke="none"/>
  </g>

  <!-- Floating qi particles (yellow/lime sparks) -->
  <g fill="#d6ff3a">
    <circle cx="240" cy="140" r="2"/>
    <circle cx="560" cy="160" r="2"/>
    <circle cx="180" cy="300" r="1.8"/>
    <circle cx="620" cy="320" r="2"/>
    <circle cx="280" cy="380" r="1.6"/>
    <circle cx="520" cy="380" r="1.6"/>
  </g>
  <g fill="#ff8a3d" fill-opacity="0.85">
    <circle cx="320" cy="100" r="1.8"/>
    <circle cx="480" cy="100" r="1.8"/>
    <circle cx="160" cy="220" r="2"/>
    <circle cx="640" cy="220" r="2"/>
  </g>

  <!-- "qi gong" wordmark in the corner cabinet style -->
  <g font-family="ui-monospace, Menlo, monospace" text-anchor="middle">
    <text x="400" y="80" font-size="11" fill="#ff8a3d" letter-spacing="6" font-weight="700">~ ASCENSION ARC ~</text>
  </g>

  <!-- Bottom callout: hanzi sub-title + quip -->
  <g font-family="Noto Serif SC, serif" text-anchor="middle">
    <text x="400" y="408" font-size="16" fill="#00ffe1" fill-opacity="0.85" letter-spacing="14" font-weight="700">氣 功 修 煉</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" text-anchor="middle">
    <text x="400" y="425" font-size="9" fill="#ffffff" fill-opacity="0.5" letter-spacing="2.5">// IT'S GIVING IMMORTAL</text>
  </g>

  <!-- HUD labels -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#00ffe1" fill-opacity="0.75" letter-spacing="2">
    <text x="32" y="40">// QIGONG</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ffffff" fill-opacity="0.45" letter-spacing="2.5">
    <text x="32" y="60">CULTIVATION.MODE</text>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#ff8a3d" fill-opacity="0.75" letter-spacing="2" text-anchor="end">
    <text x="768" y="40">[ POSE.TRACK ]</text>
    <text x="768" y="60" fill="#00ffe1" fill-opacity="0.65">QI:FLOWING</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#00ffe1" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <path d="M 16 16 L 16 32 M 16 16 L 32 16"/>
    <path d="M 784 16 L 784 32 M 784 16 L 768 16"/>
    <path d="M 16 434 L 16 418 M 16 434 L 32 434"/>
    <path d="M 784 434 L 784 418 M 784 434 L 768 434"/>
  </g>
</svg>
