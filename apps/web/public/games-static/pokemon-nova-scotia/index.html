<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Nova Scotia</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gameboy">
    <div class="brand">POK<span class="accent">e</span>MON NOVA SCOTIA</div>
    <div class="screen-frame">
      <canvas id="game" width="160" height="144"></canvas>
    </div>
    <div class="controls">
      Arrow keys: move &nbsp;&middot;&nbsp; Z: A button (talk / confirm) &nbsp;&middot;&nbsp; X: B button
    </div>
    <div class="power-led">POWER</div>
    <div class="faux-controls">
      <span class="faux-btn b">B</span>
      <span class="faux-btn">A</span>
    </div>
  </div>
  <script src="world.js"></script>
  <script src="game.js"></script>
</body>
</html>
